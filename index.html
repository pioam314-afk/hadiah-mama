<script>
    // 1. YOUR ACTUAL FORMSPREE ID
    const FORMSPREE_ID = "meengrok"; 

    // ... (rest of your coupons array) ...

    async function redeem(id, title) {
        // Change the logic here to match your ID
        if (FORMSPREE_ID === "meengrok") {
            alert("Please set your ID first!");
            return;
        }

        try {
            // Use your ID in the fetch URL
            const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    subject: `Mama's 50th Birthday: Voucher Redeemed!`,
                    message: `Happy 50th! Mama just redeemed: ${title}` 
                })
            });

            if (response.ok) {
                document.getElementById(`coupon-${id}`).classList.add('redeemed');
                const msg = document.getElementById('status-msg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 4000);
            }
        } catch (error) {
            alert("Connection error. Please try again!");
        }
    }
</script>
