<script>
    // 1. YOUR ACTUAL FORMSPREE ID
    const FORMSPREE_ID = "meengrok"; 

    // ... (rest of your coupons array) ...

   async function redeem(id, title) {
        const FORMSPREE_ID = "meengrok"; // Double check this matches your ID

        try {
            const response = await fetch("https://formspree.io/f/" + FORMSPREE_ID, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: `MAMA REDEEMED: ${title}` 
                })
            });

            if (response.ok) {
                document.getElementById(`coupon-${id}`).classList.add('redeemed');
                const msg = document.getElementById('status-msg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 4000);
            } else {
                alert("Formspree error: " + response.status);
            }
        } catch (error) {
            alert("Connection error. Try again later!");
        }
    }
