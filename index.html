<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // 1. CONFIGURATION
    const FORMSPREE_ID = "meengrok"; 
    const firebaseConfig = {
        databaseURL: "https://console.firebase.google.com/u/0/project/hadiah-mama/database/hadiah-mama-default-rtdb/data/~2F" 
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const coupons = [
        { id: 1, icon: "👨🏻‍🍳", title: "Home Cooked Dinner", desc: "Pilih menu favorit Mama!" },
        { id: 2, icon: "🥂", title: "Mom - Son Date", desc: "A special outing to a place of your choice." },
        { id: 3, icon: "✨", title: "Ask Me Anything", desc: "One hour of tech support or just chatting." },
        { id: 4, icon: "🚐", title: "Personal Chauffeur", desc: "I'll be your supir for the whole day." },
        { id: 5, icon: "🧹", title: "Ultimate Cleaning", desc: "I'll handle the heavy cleaning and chores." }
    ];

    const grid = document.getElementById('coupon-grid');

    // 2. LISTEN FOR UPDATES (This handles multi-device sync)
    db.ref('vouchers').on('value', (snapshot) => {
        const redeemedData = snapshot.val() || {};
        grid.innerHTML = ''; // Clear and re-render

        coupons.forEach(c => {
            const isRedeemed = redeemedData[c.id] === true;
            const card = document.createElement('div');
            card.className = isRedeemed ? 'coupon redeemed' : 'coupon';
            card.id = `coupon-${c.id}`;
            card.innerHTML = `
                <div class="icon">${c.icon}</div>
                <h3>${c.title}</h3>
                <p>${c.desc}</p>
                <button onclick="redeem(${c.id}, '${c.title}')" ${isRedeemed ? 'disabled' : ''}>
                    ${isRedeemed ? 'Already Used' : 'Redeem Voucher'}
                </button>
            `;
            grid.appendChild(card);
        });
    });

    // 3. REDEEM FUNCTION
    async function redeem(id, title) {
        try {
            const response = await fetch("https://formspree.io/f/" + FORMSPREE_ID, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Mama redeemed: " + title })
            });

            if (response.ok) {
                // UPDATE THE CLOUD: This updates all devices instantly
                db.ref('vouchers/' + id).set(true);

                document.getElementById('status-msg').style.display = 'block';
                setTimeout(() => { document.getElementById('status-msg').style.display = 'none'; }, 4000);
            }
        } catch (error) {
            alert("Error claiming voucher. Try again!");
        }
    }
</script>
